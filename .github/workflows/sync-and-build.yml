name: Sync Upstream, Build, and Publish

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Fetch and merge upstream/main
        id: sync
        run: |
          git remote add upstream https://github.com/MetrolistGroup/Metrolist.git
          git fetch upstream main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BEFORE=$(git rev-parse HEAD)
          git merge upstream/main --no-edit
          AFTER=$(git rev-parse HEAD)

          git push origin HEAD:main

          if [ "$BEFORE" != "$AFTER" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build_release:
    name: Build Release (${{ matrix.variant }})
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Replace GitHub API Base URL in Updater.kt
        run: find . -type f -name "Updater.kt" -exec sed -i 's|MetrolistGroup/Metrolist|Binit06/Metrolist|g' {} +

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Release --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.netease.cloudmusic
          METROLIST_APP_NAME: Metrolist Fork
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v3
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Move signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"
          if [ "${{ matrix.variant }}" = "gms" ]; then
            TARGET_NAME="Metrolist-GMS.apk"
          else
            TARGET_NAME="Metrolist-FOSS.apk"
          fi
          find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | xargs -I{} mv {} "$OUTPUT_DIR/out/$TARGET_NAME"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.variant }}-${{ github.run_number }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/out/*.apk
          retention-days: 14

  build_debug:
    name: Build Debug (${{ matrix.variant }})
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Replace GitHub API Base URL in Updater.kt
        run: find . -type f -name "Updater.kt" -exec sed -i 's|MetrolistGroup/Metrolist|Binit06/Metrolist|g' {} +

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore ./app/persistent-debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Debug --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.netease.cloudmusic
          METROLIST_APP_NAME: Metrolist Fork
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Rename and Upload Debug APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/debug"
          if [ "${{ matrix.variant }}" = "gms" ]; then
            mv $OUTPUT_DIR/app-gms-debug.apk $OUTPUT_DIR/Metrolist-GMS-Debug.apk
          else
            mv $OUTPUT_DIR/app-foss-debug.apk $OUTPUT_DIR/Metrolist-FOSS-Debug.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.variant }}-${{ github.run_number }}
          path: app/build/outputs/apk/${{ matrix.variant }}/debug/*.apk
          retention-days: 14

  publish_release:
    name: Publish Release to GitHub
    needs: build_release
    runs-on: ubuntu-latest
    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: apks

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: update-${{ github.run_number }}
          name: Metrolist Auto-build Update ${{ github.run_number }}
          generate_release_notes: true
          files: apks/*.apk
