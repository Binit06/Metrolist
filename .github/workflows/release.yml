name: Bump to new version
on:
  push:
    branches:
      - "main"
    paths:
      - "app/build.gradle.kts"
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force a build/release even if versionName hasn't changed"
        type: boolean
        default: false

jobs:
  check-version:
    if: "!contains(github.ref, 'refs/tags')"
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
      version_code: ${{ steps.check_version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check if version changed
        id: check_version
        env:
          # Only ever true for a manual run where the checkbox was ticked;
          # a plain push-triggered run has no `inputs.force_release`, so
          # this safely resolves to "false" in that case.
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release == true && 'true' || 'false' }}
        run: |
          if [ ! -f app/build.gradle.kts ]; then
            echo "File app/build.gradle.kts does not exist"
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # -m1: build.gradle.kts commonly declares versionName more than
          # once (defaultConfig, plus once per product flavor — this repo
          # has three: foss/gms/izzy). Without -m1, grep returns every
          # match, and capturing that with $(...) collapses the newlines
          # into spaces, producing a garbled multi-value string that
          # corrupts the GITHUB_OUTPUT entry and the release tag/title.
          # -m1 pins us to the first (defaultConfig) declaration.
          NEW_VERSION=$(grep -m1 -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "")
          VERSION_CODE=$(grep -m1 -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts || echo "")

          NEW_VERSION=$(echo "$NEW_VERSION" | xargs)
          VERSION_CODE=$(echo "$VERSION_CODE" | xargs)

          if [ -z "$NEW_VERSION" ]; then
            echo "Could not find versionName in app/build.gradle.kts"
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! [[ "$NEW_VERSION" =~ ^[0-9]+(\.[0-9]+)*(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Extracted versionName '$NEW_VERSION' is not a valid version string (check for duplicate/ambiguous versionName declarations in app/build.gradle.kts)"
            exit 1
          fi

          if [ -n "$VERSION_CODE" ] && ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Extracted versionCode '$VERSION_CODE' is not a valid integer"
            exit 1
          fi

          echo "Current version: $NEW_VERSION (code: $VERSION_CODE)"

          OLD_VERSION=""
          if git show HEAD^:app/build.gradle.kts > /dev/null 2>&1; then
            OLD_VERSION=$(git show HEAD^:app/build.gradle.kts | grep -m1 -oP 'versionName\s*=\s*"\K[^"]+' || echo "")
            OLD_VERSION=$(echo "$OLD_VERSION" | xargs)
            echo "Previous version: $OLD_VERSION"
          fi

          if [ -z "$OLD_VERSION" ]; then
            echo "First version detected: $NEW_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          elif [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          elif [ "$FORCE_RELEASE" = "true" ]; then
            # Manual run with the "force" checkbox ticked: version is
            # unchanged, but the caller explicitly asked to build/release
            # it anyway. Still populate new_version/version_code — this is
            # exactly what was missing before and produced an empty "v"
            # release.
            echo "Version unchanged ($NEW_VERSION) but force_release was requested — proceeding anyway"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged: $NEW_VERSION"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug output
        run: |
          echo "Debug Information:"
          echo "  - version_changed: ${{ steps.check_version.outputs.version_changed }}"
          echo "  - new_version: ${{ steps.check_version.outputs.new_version }}"
          echo "  - version_code: ${{ steps.check_version.outputs.version_code }}"
          echo "  - event_name: ${{ github.event_name }}"
          echo "  - force_release input: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release || 'n/a' }}"

  build:
    needs: check-version
    # No more blanket "|| workflow_dispatch" bypass — a manual run only
    # builds if check-version says version_changed=true, which now
    # correctly covers both a real version bump AND an explicit force.
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms
          - variant: izzy
            variantName: Izzy

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Lint Release APK
        run: ./gradlew --console=plain clean assemble${{ matrix.variantName }}Release :app:lint${{ matrix.variantName }}Release --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.netease.cloudmusic
          METROLIST_APP_NAME: Metrolist
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move and rename signed APKs
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"

          SIGNED_APK=$(find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | head -1)

          if [ -z "$SIGNED_APK" ]; then
            echo "No signed APK found for ${{ matrix.variant }}"
            ls -la "$OUTPUT_DIR"
            exit 1
          fi

          if [ "${{ matrix.variant }}" = "gms" ]; then
            TARGET_NAME="Metrolist-with-Google-Cast.apk"
          elif [ "${{ matrix.variant }}" = "izzy" ]; then
            TARGET_NAME="Metrolist-izzy.apk"
          else
            TARGET_NAME="Metrolist.apk"
          fi

          mv "$SIGNED_APK" "$OUTPUT_DIR/out/$TARGET_NAME"

          echo "APK renamed to: $TARGET_NAME"
          ls -la "$OUTPUT_DIR/out/"

      - name: Upload Signed APKs
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.variant == 'gms' && 'Metrolist-with-Google-Cast' || matrix.variant == 'izzy' && 'Metrolist-izzy' || 'Metrolist' }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/out/*.apk

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version before publishing
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          if [ -z "$VERSION" ] || ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Refusing to create a release with invalid/empty version '$VERSION'"
            exit 1
          fi
          echo "Publishing version: $VERSION"

      - name: Download all APKs
        uses: actions/download-artifact@v7
        with:
          path: downloaded_artifacts/

      - name: Organize APKs for release
        run: |
          echo "Organizing APK files..."
          mkdir -p release_files

          find downloaded_artifacts -name "*.apk" -exec cp {} release_files/ \;

          echo "APKs ready for release:"
          ls -la release_files/

      - name: Parse release notes from changelog
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          chmod +x .github/scripts/parse_changelog.sh

          if bash .github/scripts/parse_changelog.sh "$VERSION" changelog.md > release_notes.md; then
            echo "Release notes sourced from changelog.md for v$VERSION"
            echo "--- Preview (first 20 lines) ---"
            head -20 release_notes.md
          else
            echo "::warning::v$VERSION not found in changelog.md — falling back to git log"
            {
              echo "Release of version $VERSION"
              echo ""
              git log "$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD" \
                --pretty=format:"- %s" --no-merges | head -10 || echo "- Initial release"
            } > release_notes.md
            echo "--- Fallback notes ---"
            cat release_notes.md
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          TAG="v$VERSION"

          # A forced manual rebuild can target a version that's already
          # been released (tag already exists). Rather than fail on the
          # duplicate tag, replace the existing release + tag so the
          # rebuilt APKs actually get published.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — deleting it before recreating (forced rebuild)"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

          echo "Creating release $TAG"

          gh release create "$TAG" \
            --title "$VERSION" \
            --notes-file release_notes.md \
            --latest \
            release_files/*.apk

          echo "Release created successfully!"

      - name: Update release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ needs.check-version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ needs.check-version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APKs Built**: $(ls release_files/*.apk | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL**: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY